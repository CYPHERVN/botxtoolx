<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNWIN PRO MAX</title>
    <style>
        body { background: #000; color: #0ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 4px solid #111; border-top: 4px solid #0ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p id="status" style="margin-top:15px; font-weight:bold;">ĐANG KẾT NỐI MÁY CHỦ BẢO MẬT...</p>
    </div>

    <script>
        // CẬU NHỚ THAY ĐÚNG LINK WORKER CỦA CẬU VÀO ĐÂY NHÉ
        const WORKER_URL = 'https://giay-to-mat.ngtientaimusic.workers.dev';

        async function loadTool() {
            try {
                const res = await fetch(WORKER_URL, { method: 'POST' });
                if (!res.ok) throw new Error("Mã lỗi " + res.status);
                
                const html = await res.text();
                document.open();
                document.write(html);
                document.close();
            } catch(e) {
                document.getElementById('status').innerText = "LỖI KẾT NỐI: " + e.message;
                document.getElementById('status').style.color = "red";
            }
        }
        
        loadTool();
    </script>
</body>
</html>
